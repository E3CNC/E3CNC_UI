---
- name: Ensure [cnc_agent] section header in moonraker.conf
  ansible.builtin.lineinfile:
    path: '{{ moonraker_conf }}'
    line: '[cnc_agent]'
    insertbefore: EOF
    create: true

- name: Ensure extractor_path in [cnc_metadata] section
  community.general.ini_file:
    path: '{{ moonraker_conf }}'
    section: cnc_metadata
    option: extractor_path
    value: '{{ printer_data.scripts_dir }}/cnc_metadata_extractor.py'
    value_delimiter: ': '

- name: Ensure timeout in [cnc_metadata] section
  community.general.ini_file:
    path: '{{ moonraker_conf }}'
    section: cnc_metadata
    option: timeout
    value: '30.0'
    value_delimiter: ': '

- name: Ensure [update_manager E3CNC_UI] section in moonraker.conf
  ansible.builtin.blockinfile:
    path: '{{ moonraker_conf }}'
    marker: '# {mark} ANSIBLE MANAGED BLOCK - update_manager E3CNC_UI'
    insertafter: EOF
    create: true
    block: |-
      [update_manager E3CNC_UI]
      type: git_repo
      channel: dev
      path: {{ repo.dest }}
      origin: {{ repo.url }}
      primary_branch: {{ repo.branch }}
      enable_node_updates: False
      is_system_service: False
      post_update_script: {{ repo.dest }}/scripts/post_update.sh
      info_tags:
          desc=E3CNC UI
      managed_services: klipper moonraker
      refresh_interval: 24
