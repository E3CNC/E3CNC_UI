---
- name: Check whether base stack bootstrap is needed
  ansible.builtin.stat:
    path: '{{ item }}'
  loop:
    - '{{ moonraker_dir }}/moonraker/moonraker.py'
    - '{{ klipper_dir }}/klippy/klippy.py'
    - '{{ moonraker_conf }}'
  register: bootstrap_stack_stats

- name: Classify bootstrap state
  ansible.builtin.set_fact:
    e3cnc_bootstrap_all_present: '{{ (bootstrap_stack_stats.results | selectattr("stat.exists", "equalto", false) | list | length) == 0 }}'
    e3cnc_bootstrap_partial_present: >-
      {{ (bootstrap_stack_stats.results | selectattr("stat.exists", "equalto", false) | list | length) > 0 and (bootstrap_stack_stats.results | selectattr("stat.exists", "equalto", true) | list | length) > 0 }}
    e3cnc_skip_klippy_ready_check: false
    e3cnc_placeholder_printer_cfg: false
    e3cnc_bootstrap_needed: true

- name: Abort bootstrap when existing installation appears only partially present
  ansible.builtin.fail:
    msg: >
      Partial existing installation detected (only some Moonraker/Klipper files present).
      Auto-bootstrap will not overwrite an existing install. Verify your installation manually
      or remove the existing tree before retrying install.
  when: e3cnc_bootstrap_partial_present

- name: Skip bootstrap entirely when all core files already exist
  ansible.builtin.set_fact:
    e3cnc_bootstrap_needed: false
  when: e3cnc_bootstrap_all_present

- name: Override frontend web root for fresh single-instance bootstrap installs
  ansible.builtin.set_fact:
    frontend_web_root: '{{ ansible_env.HOME }}/e3cnc-web'
  when: e3cnc_bootstrap_needed

- name: Install base system packages for fresh single-instance stack
  ansible.builtin.apt:
    name:
      - git
      - curl
      - unzip
      - nginx
      - supervisor
      - python3
      - python3-pip
      - python3-venv
      - python3-dev
      - build-essential
      - libffi-dev
      - libssl-dev
      - libsodium23
    state: present
    update_cache: true
  become: true
  when: e3cnc_bootstrap_needed

- name: Install sudoers drop-in for passwordless E3CNC service management
  ansible.builtin.copy:
    dest: /etc/sudoers.d/e3cnc
    mode: '0440'
    owner: root
    group: root
    content: |
      # E3CNC — passwordless sudo for process management
      # Installed by ansible bootstrap. Do not edit manually.
      {{ ansible_user_id }} ALL=(root) NOPASSWD: /usr/bin/systemctl restart e3cnc-*
      {{ ansible_user_id }} ALL=(root) NOPASSWD: /usr/bin/systemctl daemon-reload
      {{ ansible_user_id }} ALL=(root) NOPASSWD: /usr/bin/systemctl reload nginx
      {{ ansible_user_id }} ALL=(root) NOPASSWD: /usr/bin/supervisorctl *
      {{ ansible_user_id }} ALL=(root) NOPASSWD: /usr/bin/tee /etc/supervisor/conf.d/e3cnc-*.conf
      {{ ansible_user_id }} ALL=(root) NOPASSWD: /bin/ln -sf /etc/nginx/sites-* /etc/nginx/sites-enabled/*
      {{ ansible_user_id }} ALL=(root) NOPASSWD: /bin/rm /etc/supervisor/conf.d/e3cnc-*.conf
  become: true
  when: e3cnc_bootstrap_needed

- name: Ensure base directories exist for fresh single-instance stack
  ansible.builtin.file:
    path: '{{ item }}'
    state: directory
    mode: '0755'
  loop:
    - '{{ printer_data_dir }}'
    - '{{ printer_data.config_dir }}'
    - '{{ printer_data.scripts_dir }}'
    - '{{ printer_data.E3CNC_dir }}'
    - '{{ printer_data.E3CNC_dir }}/macros'
    - '{{ printer_data_dir }}/logs'
    - '{{ printer_data_dir }}/comms'
    - '{{ printer_data_dir }}/database'
    - '{{ printer_data_dir }}/gcodes'
    - '{{ moonraker_dir }}'
    - '{{ klipper_dir }}'
    - '{{ frontend.web_root }}'
    - '{{ e3cnc_root }}/admin'
  when: e3cnc_bootstrap_needed

- name: Check vendored Moonraker snapshot exists in the monorepo
  ansible.builtin.stat:
    path: '{{ bootstrap_moonraker_source_dir }}/moonraker/moonraker.py'
  register: vendored_moonraker_stat
  when: e3cnc_bootstrap_needed

- name: Fail if vendored Moonraker snapshot is missing
  ansible.builtin.fail:
    msg: 'Vendored Moonraker snapshot not found at {{ bootstrap_moonraker_source_dir }}. Sync the monorepo contents before running bootstrap install.'
  when:
    - e3cnc_bootstrap_needed
    - not vendored_moonraker_stat.stat.exists

- name: Copy vendored Moonraker snapshot into the target Moonraker directory
  ansible.builtin.copy:
    src: '{{ bootstrap_moonraker_source_dir }}/'
    dest: '{{ moonraker_dir }}/'
    remote_src: true
  when:
    - e3cnc_bootstrap_needed
    - vendored_moonraker_stat.stat.exists

- name: Check vendored Klipper snapshot exists in the monorepo
  ansible.builtin.stat:
    path: '{{ bootstrap_klipper_source_dir }}/klippy/klippy.py'
  register: vendored_klipper_stat
  when: e3cnc_bootstrap_needed

- name: Fail if vendored Klipper snapshot is missing
  ansible.builtin.fail:
    msg: 'Vendored Klipper snapshot not found at {{ bootstrap_klipper_source_dir }}. Sync the monorepo contents before running bootstrap install.'
  when:
    - e3cnc_bootstrap_needed
    - not vendored_klipper_stat.stat.exists

- name: Copy vendored Klipper snapshot into the target Klipper directory
  ansible.builtin.copy:
    src: '{{ bootstrap_klipper_source_dir }}/'
    dest: '{{ klipper_dir }}/'
    remote_src: true
  when:
    - e3cnc_bootstrap_needed
    - vendored_klipper_stat.stat.exists

- name: Ensure Moonraker virtualenv exists
  ansible.builtin.command:
    cmd: python3 -m venv {{ moonraker_dir }}/venv
    creates: '{{ moonraker_dir }}/venv/bin/python'
  when: e3cnc_bootstrap_needed

- name: Ensure Klipper virtualenv exists
  ansible.builtin.command:
    cmd: python3 -m venv {{ klipper_dir }}/venv
    creates: '{{ klipper_dir }}/venv/bin/python'
  when: e3cnc_bootstrap_needed

- name: Check for Moonraker requirements file
  ansible.builtin.stat:
    path: '{{ moonraker_dir }}/scripts/moonraker-requirements.txt'
  register: moonraker_requirements
  when: e3cnc_bootstrap_needed

- name: Install Moonraker Python dependencies
  ansible.builtin.pip:
    requirements: '{{ moonraker_dir }}/scripts/moonraker-requirements.txt'
    virtualenv: '{{ moonraker_dir }}/venv'
  when:
    - e3cnc_bootstrap_needed
    - moonraker_requirements.stat.exists

- name: Check for Klipper requirements file
  ansible.builtin.stat:
    path: '{{ klipper_dir }}/scripts/klippy-requirements.txt'
  register: klipper_requirements
  when: e3cnc_bootstrap_needed

- name: Install Klipper Python dependencies
  ansible.builtin.pip:
    requirements: '{{ klipper_dir }}/scripts/klippy-requirements.txt'
    virtualenv: '{{ klipper_dir }}/venv'
  when:
    - e3cnc_bootstrap_needed
    - klipper_requirements.stat.exists

- name: Check whether printer.cfg already exists
  ansible.builtin.stat:
    path: '{{ printer_data.printer_cfg }}'
  register: printer_cfg_stat
  when: e3cnc_bootstrap_needed

- name: Create placeholder printer.cfg for first-time bootstrap
  ansible.builtin.copy:
    dest: '{{ printer_data.printer_cfg }}'
    mode: '0644'
    content: |
      # E3CNC bootstrap placeholder printer.cfg
      #
      # This file was created by the fresh-install bootstrap path so the
      # software stack can be laid down on a clean machine.
      #
      # Replace this file with your real machine configuration before
      # enabling or starting Klipper for production use.
      #
      # Suggested next steps:
      #   1. Copy in your machine's real printer.cfg
      #   2. Verify MCU paths, drivers, steppers, limits, and spindle wiring
      #   3. Start or enable the {{ klipper_service }} service
  when:
    - e3cnc_bootstrap_needed
    - not printer_cfg_stat.stat.exists

- name: Mark placeholder printer.cfg state
  ansible.builtin.set_fact:
    e3cnc_skip_klippy_ready_check: true
    e3cnc_placeholder_printer_cfg: true
  when:
    - e3cnc_bootstrap_needed
    - not printer_cfg_stat.stat.exists

- name: Check whether moonraker.conf already exists
  ansible.builtin.stat:
    path: '{{ moonraker_conf }}'
  register: moonraker_conf_stat
  when: e3cnc_bootstrap_needed

- name: Create baseline moonraker.conf for first-time bootstrap
  ansible.builtin.copy:
    dest: '{{ moonraker_conf }}'
    mode: '0644'
    content: |
      [server]
      host: 0.0.0.0
      port: {{ moonraker_port }}
      klippy_uds_address: {{ printer_data_dir }}/comms/klippy.sock

      [file_manager]
      config_path: {{ printer_data.config_dir }}

      [database]
      database_path: {{ printer_data_dir }}/database

      [authorization]
      cors_domains:
          *
      trusted_clients:
          127.0.0.1
          ::1

      # Harden first-boot exposure after bootstrap:
      # 1) enable Moonraker token auth (`moonraker-admin-token.sh create`)
      # 2) restrict `trusted_clients` to known LAN CIDR(s)
  when:
    - e3cnc_bootstrap_needed
    - not moonraker_conf_stat.stat.exists

- name: Install Moonraker systemd service for fresh single-instance bootstrap
  ansible.builtin.copy:
    dest: '/etc/systemd/system/{{ moonraker_service }}.service'
    mode: '0644'
    content: |
      [Unit]
      Description=Moonraker API Server
      After=network.target

      [Service]
      Type=simple
      User={{ ansible_user_id }}
      WorkingDirectory={{ moonraker_dir }}
      ExecStart={{ moonraker_dir }}/venv/bin/python {{ moonraker_dir }}/moonraker/moonraker.py -d {{ printer_data_dir }}
      Restart=always
      RestartSec=2

      [Install]
      WantedBy=multi-user.target
  become: true
  when: e3cnc_bootstrap_needed

- name: Install Klipper systemd service for fresh single-instance bootstrap
  ansible.builtin.copy:
    dest: '/etc/systemd/system/{{ klipper_service }}.service'
    mode: '0644'
    content: |
      [Unit]
      Description=Klipper Firmware Host
      After=network.target

      [Service]
      Type=simple
      User={{ ansible_user_id }}
      WorkingDirectory={{ klipper_dir }}
      ExecStart={{ klipper_dir }}/venv/bin/python {{ klipper_dir }}/klippy/klippy.py {{ printer_data.printer_cfg }} -I {{ printer_data_dir }}/comms/klippy.serial -l {{ printer_data_dir }}/logs/klippy.log -a {{ printer_data_dir }}/comms/klippy.sock
      Restart=always
      RestartSec=2

      [Install]
      WantedBy=multi-user.target
  become: true
  when: e3cnc_bootstrap_needed

- name: Install nginx site for E3CNC fresh bootstrap
  ansible.builtin.copy:
    dest: '/etc/nginx/sites-available/{{ bootstrap_nginx_site_name }}'
    mode: '0644'
    content: |
      server {
          listen 80;
          listen [::]:80;
          server_name e3cnc.local;

          root {{ frontend.web_root }};
          index index.html;

          location / {
              try_files $uri $uri/ /index.html;
          }

          location /websocket {
              proxy_pass http://127.0.0.1:{{ moonraker_port }}/websocket;
              proxy_http_version 1.1;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";
              proxy_read_timeout 86400;
          }

          location /printer/ {
              proxy_pass http://127.0.0.1:{{ moonraker_port }}/printer/;
              proxy_set_header Host $host;
          }

          location /api/ {
              proxy_pass http://127.0.0.1:{{ moonraker_port }}/api/;
              proxy_set_header Host $host;
          }

          location /server/ {
              proxy_pass http://127.0.0.1:{{ moonraker_port }}/server/;
              proxy_set_header Host $host;
          }

          location /machine/ {
              proxy_pass http://127.0.0.1:{{ moonraker_port }}/machine/;
              proxy_set_header Host $host;
          }

          location /access/ {
              proxy_pass http://127.0.0.1:{{ moonraker_port }}/access/;
              proxy_set_header Host $host;
          }

          location /admin {
              alias {{ e3cnc_root }}/admin;
              index index.html;
          }
      }
  become: true
  when: e3cnc_bootstrap_needed

- name: Enable nginx site for E3CNC bootstrap
  ansible.builtin.file:
    src: '/etc/nginx/sites-available/{{ bootstrap_nginx_site_name }}'
    dest: '/etc/nginx/sites-enabled/{{ bootstrap_nginx_site_name }}'
    state: link
  become: true
  when: e3cnc_bootstrap_needed

- name: Test nginx config before reload
  ansible.builtin.command:
    cmd: nginx -t
  become: true
  changed_when: false
  when:
    - e3cnc_bootstrap_needed
    - not (bootstrap_skip_runtime_start | default(false) | bool)

- name: Ensure avahi-utils is installed for mDNS publishing
  ansible.builtin.apt:
    name: avahi-utils
    state: present
  become: true
  when: e3cnc_bootstrap_needed

- name: Install Avahi e3cnc.local publisher service
  ansible.builtin.copy:
    dest: /etc/systemd/system/avahi-publish-e3cnc.service
    mode: '0644'
    content: |
      [Unit]
      Description=Publish e3cnc.local via mDNS/Avahi
      After=avahi-daemon.service
      Requires=avahi-daemon.service
      PartOf=avahi-daemon.service

      [Service]
      Type=simple
      ExecStart=/usr/bin/avahi-publish -a e3cnc.local
      ExecStop=/bin/sh -c '/usr/bin/avahi-publish -a e3cnc.local --remove || true'
      Restart=on-failure
      RestartSec=3
      User=nobody

      [Install]
      WantedBy=multi-user.target
  become: true
  when: e3cnc_bootstrap_needed

- name: Reload systemd after bootstrap unit installation
  ansible.builtin.systemd:
    daemon_reload: true
  become: true
  when:
    - e3cnc_bootstrap_needed
    - not (bootstrap_skip_runtime_start | default(false) | bool)

- name: Enable and start Avahi e3cnc publisher
  ansible.builtin.systemd:
    name: avahi-publish-e3cnc
    enabled: true
    state: restarted
    daemon_reload: true
  become: true
  when:
    - e3cnc_bootstrap_needed
    - not (bootstrap_skip_runtime_start | default(false) | bool)

- name: Enable and start Supervisord
  ansible.builtin.systemd:
    name: supervisor
    enabled: true
    state: started
  become: true
  when: e3cnc_bootstrap_needed

- name: Enable and start nginx for E3CNC bootstrap
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: restarted
  become: true
  when:
    - e3cnc_bootstrap_needed
    - not (bootstrap_skip_runtime_start | default(false) | bool)

- name: Enable and start Moonraker for E3CNC bootstrap
  ansible.builtin.systemd:
    name: '{{ moonraker_service }}'
    enabled: true
    state: restarted
  become: true
  when:
    - e3cnc_bootstrap_needed
    - not (bootstrap_skip_runtime_start | default(false) | bool)

- name: Install Klipper service without starting when using placeholder config
  ansible.builtin.systemd:
    name: '{{ klipper_service }}'
    enabled: false
    state: stopped
  become: true
  when:
    - e3cnc_bootstrap_needed
    - not (bootstrap_skip_runtime_start | default(false) | bool)
    - e3cnc_placeholder_printer_cfg

- name: Start Klipper when an existing printer.cfg was already present
  ansible.builtin.systemd:
    name: '{{ klipper_service }}'
    enabled: true
    state: restarted
  become: true
  when:
    - e3cnc_bootstrap_needed
    - not (bootstrap_skip_runtime_start | default(false) | bool)
    - not e3cnc_placeholder_printer_cfg

- name: Explain skipped runtime start for bootstrap integration environments
  ansible.builtin.debug:
    msg:
      - 'Bootstrap laid down files and service units, but runtime service start was skipped by configuration.'
      - 'Set bootstrap_skip_runtime_start=false to start nginx, Moonraker, and Klipper during install.'
  when:
    - e3cnc_bootstrap_needed
    - bootstrap_skip_runtime_start | default(false) | bool

- name: Explain follow-up steps for placeholder printer.cfg
  ansible.builtin.debug:
    msg:
      - 'Fresh software stack bootstrap completed.'
      - 'A placeholder printer.cfg was created, so Klipper readiness checks will be skipped for this run.'
      - 'Replace {{ printer_data.printer_cfg }} with your real machine config, then start {{ klipper_service }}.'
  when: e3cnc_placeholder_printer_cfg
