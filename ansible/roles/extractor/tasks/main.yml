---
- name: Ensure printer_data scripts directory exists
  ansible.builtin.file:
    path: "{{ printer_data.scripts_dir }}"
    state: directory
    mode: "0755"

- name: Deploy cnc_metadata_extractor.py
  ansible.builtin.copy:
    src: "{{ repo.dest }}/scripts/cnc_metadata_extractor.py"
    dest: "{{ printer_data.scripts_dir }}/cnc_metadata_extractor.py"
    mode: "0755"
    remote_src: true
