---
# Build frontend — always use npm (available on all targets)
- name: Check that npm is available
  ansible.builtin.command: 'which npm'
  register: pkg_check
  changed_when: false
  failed_when: pkg_check.rc != 0
  when: not ansible_check_mode

- name: Install frontend dependencies
  ansible.builtin.command:
    cmd: npm install --legacy-peer-deps
    chdir: '{{ repo.dest }}'
  environment:
    PATH: '{{ ansible_env.HOME }}/.local/bin:{{ ansible_env.HOME }}/.bun/bin:/usr/local/bin:/usr/bin:/bin'
  when: not ansible_check_mode

- name: Build frontend
  ansible.builtin.command:
    cmd: npm run build
    chdir: '{{ repo.dest }}'
  environment:
    PATH: '{{ ansible_env.HOME }}/.local/bin:{{ ansible_env.HOME }}/.bun/bin:/usr/local/bin:/usr/bin:/bin'
  when: not ansible_check_mode

- name: Ensure web root directory exists
  ansible.builtin.file:
    path: '{{ frontend.web_root }}'
    state: directory
    mode: '0755'

- name: Deploy built frontend to web root
  ansible.builtin.copy:
    src: '{{ repo.dest }}/dist/'
    dest: '{{ frontend.web_root }}/'
    remote_src: true

- name: Get git commit hash for version stamp
  ansible.builtin.command:
    cmd: git rev-parse --short HEAD
    chdir: '{{ repo.dest }}'
  register: git_commit
  changed_when: false
  when: not ansible_check_mode

- name: Write version.json
  ansible.builtin.copy:
    dest: '{{ frontend.web_root }}/version.json'
    content: |
      {
        "buildTime": "{{ ansible_date_time.iso8601 }}",
        "commit": "{{ git_commit.stdout | default('unknown') }}"
      }
    mode: '0644'

- name: Reload nginx
  ansible.builtin.systemd:
    name: nginx
    state: reloaded
  become: true
  tags:
    - restart-services
