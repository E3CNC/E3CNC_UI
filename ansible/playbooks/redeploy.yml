---
- name: Redeploy E3CNC_UI — re-vendor agent, rebuild frontend, restart
  hosts: cnc
  gather_facts: true
  vars_files:
    - ../vars/main.yml
  roles:
    - role: agent
      tags: [agent]
    - role: extractor
      tags: [extractor]
    - role: klipper-extras
      tags: [klipper-extras]
    - role: macros
      tags: [macros]
    - role: frontend
      tags: [frontend]
  post_tasks:
    - name: Restart moonraker
      ansible.builtin.systemd:
        name: moonraker
        state: restarted
      become: true
      tags:
        - restart-services

    - name: Wait for moonraker API to respond
      ansible.builtin.uri:
        url: 'http://127.0.0.1:7125/printer/info'
        method: GET
      register: moonraker_api
      retries: 30
      delay: 1
      until: moonraker_api.status == 200
      tags:
        - restart-services

    - name: Verify Klippy reports ready
      ansible.builtin.uri:
        url: 'http://127.0.0.1:7125/printer/info'
        method: GET
      register: klippy_info
      retries: 20
      delay: 3
      until: klippy_info.json is defined and klippy_info.json.result.state == 'ready'
      tags:
        - restart-services

    - name: Verify CncAgent loaded in moonraker logs
      ansible.builtin.shell:
        cmd: |
          journalctl -u moonraker --since "2 minutes ago" --no-pager 2>/dev/null \
            || tail -200 {{ printer_data.config_dir }}/../logs/moonraker.log 2>/dev/null \
            || true
        warn: false
      register: agent_logs
      changed_when: false
      failed_when: false
      tags:
        - restart-services

    - name: Set E3CNC as default theme in moonraker database
      ansible.builtin.uri:
        url: 'http://127.0.0.1:7125/server/database/item?namespace=mainsail&key=uiSettings.theme'
        method: POST
        body_format: json
        body:
          value: 'e3cnc'
      register: theme_result
      retries: 3
      delay: 2
      until: theme_result.status == 200
      tags:
        - theme

    - name: Set E3CNC logo color in moonraker database
      ansible.builtin.uri:
        url: 'http://127.0.0.1:7125/server/database/item?namespace=mainsail&key=uiSettings.logo'
        method: POST
        body_format: json
        body:
          value: '#00FF00'
      register: logo_result
      retries: 3
      delay: 1
      until: logo_result.status == 200
      tags:
        - theme

    - name: Set E3CNC primary color in moonraker database
      ansible.builtin.uri:
        url: 'http://127.0.0.1:7125/server/database/item?namespace=mainsail&key=uiSettings.primary'
        method: POST
        body_format: json
        body:
          value: '#00FF00'
      register: primary_result
      retries: 3
      delay: 1
      until: primary_result.status == 200
      tags:
        - theme
