---
- name: Uninstall E3CNC — reverse of install.yml
  hosts: cnc
  gather_facts: true
  vars_files:
    - ../vars/main.yml
  tasks:
    - name: Remove vendored cnc_agent component
      ansible.builtin.file:
        path: '{{ agent.vender_dir }}/cnc_agent'
        state: absent

    - name: Remove vendored cnc_metadata component
      ansible.builtin.file:
        path: '{{ agent.vender_dir }}/cnc_metadata'
        state: absent

    - name: Remove cnc_metadata_extractor.py
      ansible.builtin.file:
        path: '{{ printer_data.scripts_dir }}/cnc_metadata_extractor.py'
        state: absent

    - name: Remove [cnc_agent] section header from moonraker.conf
      ansible.builtin.lineinfile:
        path: '{{ moonraker_conf }}'
        line: '[cnc_agent]'
        state: absent

    - name: Remove extractor_path from [cnc_metadata] section
      ansible.builtin.lineinfile:
        path: '{{ moonraker_conf }}'
        regexp: '^extractor_path:'
        state: absent

    - name: Remove timeout from [cnc_metadata] section
      ansible.builtin.lineinfile:
        path: '{{ moonraker_conf }}'
        regexp: '^timeout:'
        state: absent

    - name: Remove work_coordinate_systems.py from klippy/extras/
      ansible.builtin.file:
        path: '{{ klipper.extras_dir }}/work_coordinate_systems.py'
        state: absent

    - name: Remove E3CNC directory from printer_data/config/
      ansible.builtin.file:
        path: '{{ printer_data.E3CNC_dir }}'
        state: absent
      ignore_errors: true

    - name: Remove nginx site for E3CNC bootstrap
      ansible.builtin.file:
        path: '{{ item.path }}'
        state: absent
      loop:
        - path: '/etc/nginx/sites-available/{{ bootstrap_nginx_site_name }}'
        - path: '/etc/nginx/sites-enabled/{{ bootstrap_nginx_site_name }}'
      become: true
      ignore_errors: true

    - name: Remove Avahi mDNS publisher for E3CNC
      ansible.builtin.file:
        path: /etc/systemd/system/avahi-publish-e3cnc.service
        state: absent
      become: true
      ignore_errors: true

    - name: Remove stale E3CNC frontend web roots from fresh bootstrap
      ansible.builtin.file:
        path: '{{ item }}'
        state: absent
      loop:
        - '{{ ansible_env.HOME }}/e3cnc-web'
        - '{{ ansible_env.HOME }}/mainsail'
      ignore_errors: true

    - name: Restart moonraker
      ansible.builtin.systemd:
        name: '{{ moonraker_service }}'
        state: restarted
      become: true
      ignore_errors: true
      tags:
        - restart-services
