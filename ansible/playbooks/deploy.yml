---
- name: Deploy E3CNC frontend — download from GitHub release
  hosts: cnc
  gather_facts: true
  vars_files:
    - ../vars/main.yml
  tasks:
    - name: Deploy frontend via download script
      ansible.builtin.command:
        cmd: '{{ repo.dest }}/build-scripts/download_frontend.sh {{ frontend.web_root }}'
        chdir: '{{ repo.dest }}'
      register: frontend_deploy
      changed_when: '"Frontend updated" in frontend_deploy.stdout or "built locally" in frontend_deploy.stdout'
      when: not ansible_check_mode

    - name: Test nginx config before reload
      ansible.builtin.command:
        cmd: nginx -t
      become: true
      changed_when: false
      when: not ansible_check_mode

    - name: Reload nginx
      ansible.builtin.systemd:
        name: nginx
        state: reloaded
      become: true
      tags:
        - restart-services
