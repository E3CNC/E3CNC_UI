name: Create Release

'on':
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Optional semver tag for the release (e.g. v0.4.2). If empty, uses a semver tag on HEAD, then falls back to package.json.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          INPUT_TAG='${{ github.event.inputs.version_tag }}'
          HEAD_TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)

          if [[ -n "$INPUT_TAG" ]]; then
            VERSION="$INPUT_TAG"
          elif [[ -n "$HEAD_TAG" ]]; then
            VERSION="$HEAD_TAG"
          else
            VERSION="v$(node -p "require('./package.json').version")"
          fi

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Using release version: $VERSION"

      - name: Detect trigger type
        id: trigger
        shell: bash
        run: |
          REF='${{ github.ref }}'
          EVENT='${{ github.event_name }}'
          # Tag push → release
          if [[ "$REF" == refs/tags/* ]]; then
            echo "TYPE=release" >> $GITHUB_OUTPUT
            echo "Trigger: tag push (${REF#refs/tags/}) → full release"
          elif [[ "$EVENT" == "workflow_dispatch" ]]; then
            echo "TYPE=release" >> $GITHUB_OUTPUT
            echo "Trigger: manual dispatch → full release"
          else
            echo "TYPE=nightly" >> $GITHUB_OUTPUT
            echo "Trigger: branch push → nightly pre-release"
          fi

      - name: Validate release version
        if: steps.trigger.outputs.TYPE == 'release'
        shell: bash
        run: |
          VERSION='${{ steps.version.outputs.VERSION }}'
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Invalid release version: $VERSION"
            exit 1
          fi
          echo "Release version $VERSION is valid."

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Write version.json into dist
        run: |
          echo "{\"buildTime\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"commit\":\"${{ github.sha }}\"}" > dist/version.json

      - name: Create dist archive
        run: |
          cp ./remote/* ./dist/ 2>/dev/null || true
          cd dist && zip -r ../E3CNC-${{ steps.version.outputs.VERSION }}.zip . && cd ..

      - name: Install zstd
        if: steps.trigger.outputs.TYPE == 'release'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq zstd

      - name: Build stack artifact
        if: steps.trigger.outputs.TYPE == 'release'
        shell: bash
        run: |
          VERSION='${{ steps.version.outputs.VERSION }}'
          STACK_DIR="e3cnc-stack-${VERSION}"
          mkdir -p "${STACK_DIR}/vendor/moonraker" \
                   "${STACK_DIR}/vendor/klipper" \
                   "${STACK_DIR}/frontend" \
                   "${STACK_DIR}/config/macros" \
                   "${STACK_DIR}/scripts" \
                   "${STACK_DIR}/migrations"

          # Frontend (built assets)
          cp -r dist/* "${STACK_DIR}/frontend/"

          # Full vendored Moonraker — includes cnc_agent, cnc_metadata, MCP already integrated
          cp -r vendor/moonraker/* "${STACK_DIR}/vendor/moonraker/"

          # Full vendored Klipper — includes work_coordinate_systems.py already in klippy/extras/
          cp -r vendor/klipper/* "${STACK_DIR}/vendor/klipper/"

          # Macros (merge with post_processors)
          cp macros/*.cfg "${STACK_DIR}/config/macros/"
          if [ -d post_processors/klipper/macros ]; then
            cp post_processors/klipper/macros/*.cfg "${STACK_DIR}/config/macros/"
          fi

          # Scripts
          cp scripts/cnc_metadata_extractor.py "${STACK_DIR}/scripts/"

          # CLI — bundled so e3cnc-cli runs from the current release's copy
          cp -r cli "${STACK_DIR}/cli"
          cp _e3cnc_shared.py _e3cnc_deploy.py _e3cnc_supervisor.py "${STACK_DIR}/"

          # Theme
          cp theme.json "${STACK_DIR}/"

          # Write manifest.json
          echo "{\"e3cnc_version\": \"${VERSION}\", \"moonraker_component_version\": \"${VERSION}\", \"klipper_extras_version\": \"1\", \"config_schema\": 1, \"klipper_requires\": \">=0.12.0\", \"python_requires\": \">=3.9\"}" > "${STACK_DIR}/manifest.json"

          # Create compressed archive
          tar --zstd -cf "e3cnc-stack-${VERSION}.tar.zst" "${STACK_DIR}"

          # Checksum
          sha256sum "e3cnc-stack-${VERSION}.tar.zst" > "e3cnc-stack-${VERSION}.tar.zst.sha256"

          echo "Stack artifact built: e3cnc-stack-${VERSION}.tar.zst ($(du -h "e3cnc-stack-${VERSION}.tar.zst" | cut -f1))"

      - name: Upload stack artifact (CI artifact, release builds only)
        if: steps.trigger.outputs.TYPE == 'release'
        uses: actions/upload-artifact@v5
        with:
          name: stack-artifact
          path: e3cnc-stack-*.tar.zst*
          retention-days: 90

      - name: Upload dist artifact
        uses: actions/upload-artifact@v5
        with:
          name: frontend-dist
          path: dist/
          retention-days: 30

      - name: Get short commit SHA
        id: commit
        run: echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Write release notes
        if: steps.trigger.outputs.TYPE == 'release'
        run: |
          VERSION='${{ steps.version.outputs.VERSION }}'
          echo "### What's Changed" > release-notes.md
          echo "" >> release-notes.md
          python3 build-scripts/_get_changelog_entry.py "$VERSION" >> release-notes.md 2>/dev/null \
            || echo "  See the [CHANGELOG](https://github.com/E3CNC/E3CNC/blob/main/CHANGELOG.md) for details." >> release-notes.md

      - name: Guard — stack artifact must exist before publishing
        if: steps.trigger.outputs.TYPE == 'release'
        shell: bash
        run: |
          VERSION='${{ steps.version.outputs.VERSION }}'
          STACK_ARTIFACT="e3cnc-stack-${VERSION}.tar.zst"
          if [[ ! -f "$STACK_ARTIFACT" ]]; then
            echo "ERROR: Stack artifact not found: $STACK_ARTIFACT"
            echo "The publish step requires the stack artifact. Something went wrong in the build."
            echo "Available files:"
            ls -la *.tar.zst* 2>/dev/null || echo "  (none)"
            exit 1
          fi
          echo "Stack artifact exists: $STACK_ARTIFACT ($(du -h "$STACK_ARTIFACT" | cut -f1))"

      - name: Publish release (tag / manual dispatch)
        if: steps.trigger.outputs.TYPE == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION='${{ steps.version.outputs.VERSION }}'
          ASSET="E3CNC-${VERSION}.zip"
          STACK_ARTIFACT="e3cnc-stack-${VERSION}.tar.zst"
          STACK_CHECKSUM="e3cnc-stack-${VERSION}.tar.zst.sha256"

          RELEASE_ARGS=(
            --title "${VERSION} (${{ steps.commit.outputs.SHA_SHORT }})"
            --notes-file release-notes.md
            --target main
          )

          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Updating existing release: $VERSION"
            gh release upload "$VERSION" "$ASSET" "$STACK_ARTIFACT" "$STACK_CHECKSUM" --clobber
            gh release edit "$VERSION" "${RELEASE_ARGS[@]}"
          else
            echo "Creating release: $VERSION"
            gh release create "$VERSION" \
              "${RELEASE_ARGS[@]}" \
              "$ASSET" \
              "$STACK_ARTIFACT" \
              "$STACK_CHECKSUM"
          fi

      - name: Publish nightly pre-release (branch push)
        if: steps.trigger.outputs.TYPE == 'nightly'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE_TAG="nightly-main-$(date -u +%Y%m%d)"
          ASSET="E3CNC-${{ steps.version.outputs.VERSION }}.zip"

          echo "Publishing nightly: $DATE_TAG"

          if gh release view "$DATE_TAG" >/dev/null 2>&1; then
            echo "Updating existing nightly: $DATE_TAG"
            gh release upload "$DATE_TAG" "$ASSET" --clobber
            gh release edit "$DATE_TAG" \
              --title "$DATE_TAG (${{ steps.commit.outputs.SHA_SHORT }})" \
              --notes "Nightly build from main branch — commit ${{ github.sha }}" \
              --prerelease
          else
            echo "Creating nightly: $DATE_TAG"
            gh release create "$DATE_TAG" \
              --title "$DATE_TAG (${{ steps.commit.outputs.SHA_SHORT }})" \
              --notes "Nightly build from main branch — commit ${{ github.sha }}" \
              --prerelease \
              --target main \
              "$ASSET"
          fi
